<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinobi Pirate Cipher | v9.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Poppins:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; --card: transparent; --border: #222; 
            --sharingan: #ff0000; --correct: #00FF88; --wrong: #FF3B3B;
            --accent: #00E5FF; 
            --t7p-purple: #7024AA; --t7p-green: #196F1E; --t7p-pink: #EBA7B7; --t7p-black: #170A0A;
        }
        html { background-color: #000; } 
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        header { text-align: center; margin-bottom: 0; width: 100%; z-index: 10; padding-top: 5px; }
        header h1 { 
            font-family: 'Poppins', sans-serif; font-size: 2.4rem; font-style: italic; 
            text-transform: uppercase; margin: 0; letter-spacing: -1px; line-height: 0.9;
            animation: title-pulse 3s infinite ease-in-out;
        }
        @keyframes title-pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
            50% { text-shadow: 0 0 25px rgba(0, 229, 255, 0.6); color: var(--accent); }
        }
        #season-display { color: var(--accent); letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; font-weight: 900; margin-top: 4px; opacity: 0.9; }
        
        .archive-trigger { background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; border-radius: 4px; z-index: 10; position: relative; }
        .archive-trigger:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        #sakura-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .blossom { position: absolute; opacity: 0.8; border-radius: 100% 10% 100% 100%; animation-timing-function: linear; animation-iteration-count: infinite; }

        @keyframes fall-straight { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes fall-drift-right { 0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; } 100% { transform: translateY(110vh) translateX(150px) rotate(-360deg); opacity: 0; } }
        @keyframes fall-drift-left { 0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; } 100% { transform: translateY(110vh) translateX(-150px) rotate(720deg); opacity: 0; } }
        @keyframes fall-spiral { 0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; } 50% { transform: translateY(50vh) translateX(100px) rotate(1080deg); } 100% { transform: translateY(110vh) translateX(0) rotate(2160deg); opacity: 0; } }

        .grid { display: grid; grid-template-columns: 175px repeat(3, 1fr); grid-template-rows: 110px repeat(3, 1fr); gap: 16px; padding: 5px 20px 20px; border: none; width: 95vw; max-width: 672px; aspect-ratio: 1/1; z-index: 5; position: relative; }
        .cell { display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 900; text-transform: uppercase; position: relative; word-wrap: break-word; line-height: 1.1; font-size: 0.9rem; }
        .cat-header { background: transparent; border: 1px solid transparent; padding: 5px 10px; border-bottom: 5px solid var(--accent); cursor: help; position: relative; }

        .square { background: #080808; border: 1.5px solid var(--border); cursor: pointer; position: relative; background-size: cover; background-position: center; transition: 0.15s; overflow: hidden; background-repeat: no-repeat; }
        .square:hover { border-color: var(--accent); z-index: 5; transform: scale(1.02); }

        .rarity-tag { position: absolute; top: 6px; right: 6px; font-size: 0.55rem; font-weight: 900; padding: 3px 10px; border-radius: 2px; text-transform: uppercase; z-index: 10; box-shadow: 2px 2px 10px rgba(0,0,0,0.8); color: #000; border: 1px solid #000; }
        .char-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95) 40%); color: #fff; font-size: 0.75rem; padding: 10px 0 6px; font-weight: 900; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }

        .tooltip { visibility: hidden; position: absolute; top: 115%; left: 50%; transform: translateX(-50%); background: #111; color: var(--accent); padding: 14px; border: 1px solid var(--accent); width: 200px; font-size: 0.8rem; font-weight: 700; z-index: 1000; text-transform: none; box-shadow: 0 15px 30px rgba(0,0,0,0.9); pointer-events: none; opacity: 0; transition: 0.2s; line-height: 1.3; }
        .cat-header:hover .tooltip { visibility: visible; opacity: 1; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: flex-start; padding-top: 5vh; }
        .modal-box { width: 92%; max-width: 480px; background: #111; padding: 30px; border: 1.5px solid var(--border); text-align: center; border-radius: 12px; box-sizing: border-box; }
        
        input#query { width: 100%; padding: 18px; background: #000; border: 2px solid var(--border); color: #fff; font-weight: 700; outline: none; margin-bottom: 15px; box-sizing: border-box; border-radius: 6px; font-size: 1.2rem; display: block; }
        
        .hint-btn { width: 100%; padding: 14px; background: transparent; border: 2px solid var(--sharingan); color: var(--sharingan); font-weight: 900; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; border-radius: 6px; margin-bottom: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .hint-btn:hover { background: var(--sharingan); color: #fff; border-color: #fff; box-shadow: 0 0 30px var(--sharingan), inset 0 0 10px rgba(255,255,255,0.5); transform: translateY(-2px); }

        #results { margin-top: 15px; max-height: 420px; overflow-y: auto; border: 1px solid var(--border); text-align: left; background: #080808; border-radius: 6px; }
        .res-row { padding: 18px; border-bottom: 1px solid #222; cursor: pointer; color: #aaa; font-size: 1rem; display: flex; justify-content: space-between; }
        .res-row.blacklisted { text-decoration: line-through; color: var(--wrong); opacity: 0.3; pointer-events: none; background: rgba(255, 0, 0, 0.05); }

        .mini-grid { display: grid; grid-template-columns: repeat(3, 45px); gap: 12px; justify-content: center; margin: 25px auto; }
        .mini-sq { width: 45px; height: 45px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">Shinobi Pirate Cipher</h1>
    <p id="season-display"></p>
</header>

<div class="grid" id="main-grid">
    <div class="cell"></div>
    <div class="cell cat-header" id="c0">...</div>
    <div class="cell cat-header" id="c1">...</div>
    <div class="cell cat-header" id="c2">...</div>
    <div class="cell cat-header" id="r0">...</div>
    <div class="cell square" id="sq-0-0" onclick="openSearch(0, 0)"></div>
    <div class="cell square" id="sq-0-1" onclick="openSearch(0, 1)"></div>
    <div class="cell square" id="sq-0-2" onclick="openSearch(0, 2)"></div>
    <div class="cell cat-header" id="r1">...</div>
    <div class="cell square" id="sq-1-0" onclick="openSearch(1, 0)"></div>
    <div class="cell square" id="sq-1-1" onclick="openSearch(1, 1)"></div>
    <div class="cell square" id="sq-1-2" onclick="openSearch(1, 2)"></div>
    <div class="cell cat-header" id="r2">...</div>
    <div class="cell square" id="sq-2-0" onclick="openSearch(2, 0)"></div>
    <div class="cell square" id="sq-2-1" onclick="openSearch(2, 1)"></div>
    <div class="cell square" id="sq-2-2" onclick="openSearch(2, 2)"></div>
</div>

<button class="archive-trigger" onclick="openCalendar()">[ Archive Chronology ]</button>

<div id="search-modal" class="modal"><div class="modal-box"><div style="background:#fefefe; color:var(--t7p-black); padding:25px; margin-bottom:25px; border-radius:10px; border-top:8px solid var(--accent);"><div id="target-title" style="font-size:1.8rem; font-weight:900; text-transform:uppercase;"></div><div id="target-desc" style="font-size:0.9rem; font-weight:700; color:#555; margin-top:10px; border-top:1.5px solid #ddd; padding-top:10px; text-align:left;"></div></div><input type="text" id="query" placeholder="SCAN OPERATIVE..." oninput="search()"><button id="sharingan-trigger" class="hint-btn" onclick="useSharingan()">[Use Sharingan]</button><div id="sharingan-insight" style="display:none; border:2px solid var(--sharingan); padding:12px; border-radius:6px; margin-bottom:15px; background:rgba(255,0,0,0.08);"></div><div id="results"></div><button style="width:100%; margin-top:12px; padding:14px; background:#222; color:#fff; border:none; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:0.9rem; border-radius:6px;" onclick="closeSearch()">Abort Recon</button></div></div>
<div id="calendar-modal" class="modal"><div class="modal-box"><div style="display:flex; justify-content: space-between; align-items:center;"><button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer; font-weight:900; font-size:1.5rem;"> < </button><h3 id="cal-month-year" style="margin:0; font-size:1.3rem; font-style:italic; text-transform: uppercase;"></h3><button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer; font-weight:900; font-size:1.5rem;"> > </button></div><div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px;" id="cal-grid-days"></div><button style="width:100%; margin-top:20px; padding:12px; background:#222; color:#fff; border:none; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:0.8rem; border-radius:6px;" onclick="closeCalendar()">Close Log</button></div></div>
<div id="report-modal" class="modal"><div class="modal-box"><h2 id="report-header" style="font-style:italic; margin:0; text-transform:uppercase;"></h2><div class="mini-grid" id="mini-grid-display"></div><p id="final-score" style="font-size:3.5rem; font-weight:900; color:var(--accent); margin:10px 0;"></p><button style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; font-weight:900; cursor:pointer; border-radius:6px; font-size:1.1rem; text-transform:uppercase;" id="transmit-btn" onclick="copyResults()">Transmit Intel 📋</button><button style="width:100%; margin-top:12px; padding:14px; background:#222; color:#fff; border:none; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:0.9rem; border-radius:6px;" onclick="document.getElementById('report-modal').style.display='none'">Return</button></div></div>

<script>
    const FEED_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQu_D0TAHB0hVBlCU-JDFmswPoB8qOLGKEzsfAbKfLoaut3rrdYoJ1_BmKAgX-Y0cTXvG6XvSjco1Fu/pub?gid=626671231&single=true&output=csv';
    const SEASON_COLORS = ["#00E5FF", "#7024AA", "#196F1E", "#EBA7B7", "#FFD700", "#FF3B3B"];
    const OPERATION_NAMES = ["Cipher Protocol", "Grand Line Recon", "Hidden Leaf Intel", "Valor Roster", "Pirate King Recon", "Sage Mode Cipher"];
    let db = [], rowCats = [], colCats = [], activeSq = null, missionHistory = Array(9).fill('empty'), correctCount = 0, blacklistedNames = {}, intelBriefs = {};
    let currentGridDate = new Date().toDateString(), displayMonth = new Date().getMonth(), displayYear = new Date().getFullYear();

    const BLOSSOM_CONFIG = { count: 85, pinks: ['#ffd1dc', '#ffb7c5', '#ff99aa'], anims: ['fall-straight', 'fall-drift-right', 'fall-drift-left', 'fall-spiral'] };
    function initCherryBlossoms() {
        const bg = document.createElement('div'); bg.id = 'sakura-background'; document.body.prepend(bg);
        for (let i = 0; i < BLOSSOM_CONFIG.count; i++) {
            const p = document.createElement('div'); p.className = 'blossom';
            const size = Math.random() * 12 + 10; p.style.width = `${size}px`; p.style.height = `${size}px`;
            p.style.backgroundColor = BLOSSOM_CONFIG.pinks[Math.floor(Math.random() * BLOSSOM_CONFIG.pinks.length)];
            p.style.left = `${Math.random() * 100}%`; p.style.animationName = BLOSSOM_CONFIG.anims[Math.floor(Math.random() * BLOSSOM_CONFIG.anims.length)];
            p.style.animationDuration = `${Math.random() * 7 + 6}s`; p.style.animationDelay = `${Math.random() * 10}s`; bg.appendChild(p);
        }
    }

    /**
     * INTEL RECON: The Link Hardener
     * Rewrites Google Drive links into high-speed browser-ready formats.
     */
    function hardenedLink(url) {
        if (!url) return "";
        let final = url.trim();
        if (final.includes("drive.google.com")) {
            const idMatch = final.match(/\/d\/([^/]+)/) || final.match(/id=([^&]+)/);
            if (idMatch && idMatch[1]) {
                // We use the 'googleusercontent' CDN which is much faster and rarely blocked
                return "https://lh3.googleusercontent.com/d/" + idMatch[1];
            }
        }
        return final;
    }

    async function init() { try { const res = await fetch(FEED_URL); const text = await res.text(); processData(text); loadMission(currentGridDate); initCherryBlossoms(); } catch (e) { console.error("Intel Failure", e); } }
    
    function processData(csv) {
        const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        const raw = lines.slice(1).map(l => {
            const v = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let o = { tags: "" }; 
            headers.forEach((h, i) => {
                let val = (v[i] || "").replace(/^"|"$/g, '').trim();
                if (h.includes("name") || h.includes("character")) o.name = val;
                else if (h.includes("series") || h.includes("show") || h.includes("anime")) o.series = val;
                else if (h.includes("image") || h.includes("pic") || h.includes("img") || h.includes("photo")) {
                    o.image = hardenedLink(val); // APPLY HARDENED LINK PROTOCOL
                }
                else if (h.includes("definition") || h.includes("brief")) o.def = val;
                else if (h.includes("tags")) o.tags = (o.tags ? o.tags + "," : "") + val;
            });
            return o;
        });
        raw.forEach(item => {
            if (item.def && item.name && !item.series) intelBriefs[item.name.toLowerCase()] = item.def.replace(/^-/, '').trim();
            else if (item.def && item.series && !item.name) intelBriefs[item.series.toLowerCase()] = item.def.replace(/^-/, '').trim();
            else if (item.def && item.def.includes("-")) { const parts = item.def.split("-"); intelBriefs[parts[0].trim().toLowerCase()] = parts.slice(1).join("-").trim(); }
        });
        db = raw.filter(char => char.name && char.series);
    }

    function getRarity(char) {
        const tags = (char.tags || "").split(',').filter(t => t && !t.toLowerCase().includes("hair")).length;
        if (tags > 12) return { label: 'Genin', color: '#BDBDBD' };
        if (tags > 10) return { label: 'Chunin', color: '#A5D6A7' };
        if (tags > 8)  return { label: 'Jonin', color: '#B2EBF2' };
        if (tags > 6)  return { label: 'Anbu', color: '#EEEEEE' };
        if (tags > 4)  return { label: 'Kage', color: '#FFF59D' };
        if (tags > 2)  return { label: 'Legendary Sannin', color: '#E1BEE7' };
        return { label: 'Ghost of Valor', color: '#FFCDD2' };
    }

    function calculateSeason(date) { 
        const d = new Date(date); 
        const seasonNum = ((d.getFullYear() - 2026) * 4) + Math.floor(d.getMonth() / 3) + 1; 
        const nameIdx = (seasonNum - 1) % OPERATION_NAMES.length;
        return { num: seasonNum, opName: OPERATION_NAMES[nameIdx], color: SEASON_COLORS[(seasonNum - 1) % SEASON_COLORS.length] }; 
    }

    function loadMission(dateStr) {
        currentGridDate = dateStr; missionHistory = Array(9).fill('empty'); correctCount = 0; blacklistedNames = {};
        const sInfo = calculateSeason(dateStr); 
        document.documentElement.style.setProperty('--accent', sInfo.color);
        document.getElementById('season-display').innerText = `SEASON ${sInfo.num} | Operation: ${sInfo.opName}`;
        for (let i = 0; i < 9; i++) { let s = document.getElementById(`sq-${Math.floor(i/3)}-${i%3}`); s.style.backgroundImage = 'none'; s.style.backgroundColor = "#080808"; s.innerHTML = ""; }
        setupGrid(dateStr); renderHeaders();
    }

    function setupGrid(seed) {
        const allSeries = [...new Set(db.map(c => c.series).filter(s => s))];
        const allTags = [...new Set(db.flatMap(c => (c.tags || "").split(',').map(t => t.trim())).filter(t => t && !t.toLowerCase().includes("hair")))];
        const master = [...allSeries, ...allTags];
        let h = seed.split('').reduce((a, b) => ((a << 5) - a) + b.charCodeAt(0), 0);
        const rng = () => { h = (h * 9301 + 49297) % 233280; return h / 233280; };
        const shuffle = (a) => a.sort(() => rng() - 0.5);
        let tries = 0;
        while (tries < 5000) {
            let p = shuffle([...master]); let r = p.slice(0, 3), c = p.slice(3, 6); let ok = true;
            for (let row of r) { for (let col of c) if (db.filter(char => matches(char, row) && matches(char, col)).length < 1) { ok = false; break; } if (!ok) break; }
            if (ok) { rowCats = r; colCats = c; return; } tries++;
        }
    }

    const matches = (char, goal) => { const g = (goal || "").toLowerCase(); return (char.series || "").toLowerCase() === g || (char.tags || "").toLowerCase().split(',').map(t=>t.trim()).includes(g); };
    function renderHeaders() {
        for(let i=0; i<3; i++) {
            const rDef = (intelBriefs[rowCats[i].toLowerCase()] || "Cipher Intel Alpha.");
            const cDef = (intelBriefs[colCats[i].toLowerCase()] || "Cipher Intel Beta.");
            document.getElementById(`r${i}`).innerHTML = `${rowCats[i]} <span class="tooltip">${rDef}</span>`;
            document.getElementById(`c${i}`).innerHTML = `${colCats[i]} <span class="tooltip">${cDef}</span>`;
        }
    }

    function openCalendar() { document.getElementById('calendar-modal').style.display = 'flex'; drawCal(); }
    function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
    function changeMonth(dir) { displayMonth += dir; if(displayMonth<0){displayMonth=11;displayYear--;} if(displayMonth>11){displayMonth=0;displayYear++;} drawCal(); }
    function drawCal() {
        const grid = document.getElementById('cal-grid-days'); grid.innerHTML = "";
        const first = new Date(displayYear, displayMonth, 1).getDay(), days = new Date(displayYear, displayMonth + 1, 0).getDate();
        document.getElementById('cal-month-year').innerText = `${new Date(displayYear, displayMonth).toLocaleString('default', { month: 'long' })} ${displayYear}`;
        for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= days; d++) {
            const dObj = new Date(displayYear, displayMonth, d), div = document.createElement('div');
            div.style.cssText = "padding:12px 0; font-size:1rem; font-weight:700; cursor:pointer; background:#080808; color:#fff; border-radius:4px; text-align:center;";
            if (dObj > new Date() || dObj < new Date(2026,0,1)) div.style.opacity = "0.15";
            else { if (dObj.toDateString() === currentGridDate) div.style.background = "var(--accent)"; div.onclick = () => { loadMission(dObj.toDateString()); closeCalendar(); }; }
            div.innerText = d; grid.appendChild(div);
        }
    }

    function openSearch(r, c) { 
        activeSq = {r, c}; const sqId = `sq-${r}-${c}`, rName = rowCats[r], cName = colCats[c]; if (!blacklistedNames[sqId]) blacklistedNames[sqId] = [];
        document.getElementById('target-title').innerText = `${rName} + ${cName}`;
        document.getElementById('target-desc').innerHTML = `<b>${rName}:</b> ${intelBriefs[rName.toLowerCase()] || "Alpha."}<br><b>${cName}:</b> ${intelBriefs[cName.toLowerCase()] || "Beta."}`;
        document.getElementById('query').value = ""; document.getElementById('sharingan-insight').style.display = "none"; document.getElementById('sharingan-trigger').style.display = "block"; search();
        document.getElementById('search-modal').style.display = 'flex'; document.getElementById('query').focus();
    }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

    function useSharingan() {
        const rCat = rowCats[activeSq.r], cCat = colCats[activeSq.c];
        const allCorrect = db.filter(char => matches(char, rCat) && matches(char, cCat));
        if (allCorrect.length === 0) return;
        const correct = allCorrect[Math.floor(Math.random() * allCorrect.length)];
        const rowDecoys = db.filter(char => matches(char, rCat) && !matches(char, cCat) && char.name !== correct.name);
        const colDecoys = db.filter(char => !matches(char, rCat) && matches(char, cCat) && char.name !== correct.name);
        let choiceA = rowDecoys.length > 0 ? rowDecoys[Math.floor(Math.random()*rowDecoys.length)] : db.filter(c=>c.name!==correct.name)[0];
        let choiceB = colDecoys.length > 0 ? colDecoys[Math.floor(Math.random()*colDecoys.length)] : db.filter(c=>c.name!==correct.name && c.name!==(choiceA?choiceA.name:''))[0];
        let choices = [correct, choiceA, choiceB].sort(() => Math.random() - 0.5);
        const div = document.getElementById('sharingan-insight');
        div.innerHTML = "<p style='font-size:0.8rem; color:#f00; font-weight:900; margin-top:0;'>[ CIPHER BREAK ACTIVE ]</p>";
        choices.forEach(char => {
            const b = document.createElement('button'); b.style.cssText="background:#1a1a1a; border:1.5px solid #333; color:#fff; width:100%; padding:10px; font-size:1rem; font-weight:700; cursor:pointer; text-align:left; margin-bottom:8px; border-radius:6px; box-sizing:border-box;";
            b.innerText = char.name; b.onclick = () => selectChar(char); div.appendChild(b);
        });
        document.getElementById('sharingan-trigger').style.display = "none"; div.style.display = "block";
    }

    function search() {
        const q = document.getElementById('query').value.toLowerCase().trim(), res = document.getElementById('results'), sqId = `sq-${activeSq.r}-${activeSq.c}`;
        res.innerHTML = ""; const filtered = q === "" ? db : db.filter(c => c.name.toLowerCase().includes(q));
        filtered.forEach(char => { const isB = blacklistedNames[sqId].includes(char.name), d = document.createElement('div'); d.className = 'res-row' + (isB ? ' blacklisted' : ''); d.innerHTML = `<span>${char.name}</span> <span style=\"font-size:0.7rem; opacity:0.5;\">${char.series}</span>`; if (!isB) d.onclick = () => selectChar(char); res.appendChild(d); });
    }

    function selectChar(char) {
        const idx = activeSq.r * 3 + activeSq.c, sqId = `sq-${activeSq.r}-${activeSq.c}`;
        if (matches(char, rowCats[activeSq.r]) && matches(char, colCats[activeSq.c])) {
            const s = document.getElementById(sqId); const rankInfo = getRarity(char);
            if (missionHistory[idx] === 'empty') { missionHistory[idx] = rankInfo.color; correctCount++; }
            
            // RECON INJECTION: Optimized for security and high-speed delivery
            if (char.image) {
                s.style.backgroundImage = 'url("' + char.image + '")';
                s.style.backgroundColor = "transparent";
            } else {
                s.style.backgroundImage = 'none';
                s.style.backgroundColor = "#222";
            }

            s.innerHTML = `<div class=\"rarity-tag\" style=\"background-color:${rankInfo.color}\">${rankInfo.label}</div><div class=\"char-label\">${char.name}</div>`;
            closeSearch(); if (!missionHistory.includes('empty')) showReport();
        } else { if (!blacklistedNames[sqId].includes(char.name)) blacklistedNames[sqId].push(char.name); search(); if (missionHistory[idx] === 'empty') missionHistory[idx] = 'wrong'; if (!missionHistory.includes('empty')) showReport(); }
    }

    function showReport() {
        const sInfo = calculateSeason(currentGridDate);
        document.getElementById('report-header').innerText = sInfo.opName + ' Decoded';
        document.getElementById('final-score').innerText = `${correctCount}/9`;
        const miniGrid = document.getElementById('mini-grid-display'); miniGrid.innerHTML = "";
        missionHistory.forEach(status => {
            const dot = document.createElement('div'); dot.className = 'mini-sq';
            if (status === 'wrong') dot.style.backgroundColor = 'var(--wrong)'; 
            else if (status !== 'empty') { dot.style.backgroundColor = status; dot.style.boxShadow = `0 0 15px ${status}`; }
            miniGrid.appendChild(dot);
        });
        document.getElementById('report-modal').style.display = 'flex';
    }

    function copyResults() {
        let grid = ""; missionHistory.forEach((s, i) => { grid += (s === 'wrong' ? '❌' : '💥'); if ((i + 1) % 3 === 0) grid += "\n"; });
        const s = calculateSeason(currentGridDate);
        navigator.clipboard.writeText(`🏴‍☠️ Shinobi Pirate Cipher\nSeason ${s.num}: ${s.opName}\nScore: ${correctCount}/9\n\n${grid}\nteam7pirates.com`).then(() => {
            document.getElementById('transmit-btn').innerText = "COPIED ✅";
            setTimeout(() => { document.getElementById('transmit-btn').innerText = "Transmit Intel 📋"; }, 2000);
        });
    }
    init();
</script>
</body>
</html>
