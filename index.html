<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeGrids | T7P Stabilized v5.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Poppins:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; --card: #111; --border: #222; 
            --sharingan: #ff0000; --correct: #00FF88; --wrong: #FF3B3B;
            --accent: #00E5FF; 
            --t7p-purple: #7024AA; --t7p-green: #196F1E; --t7p-pink: #EBA7B7; --t7p-black: #170A0A;
        }
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; transition: background 0.5s;
            min-height: 100vh; overflow-x: hidden;
        }
        header { text-align: center; margin-bottom: 20px; width: 100%; }
        header h1 { font-family: 'Poppins', sans-serif; font-size: 2.2rem; font-style: italic; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        
        .archive-trigger { 
            background: var(--card); border: 1px solid var(--accent); color: var(--accent); 
            padding: 8px 15px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; 
            cursor: pointer; margin-top: 10px; transition: 0.3s; border-radius: 4px;
        }

        .grid {
            display: grid; 
            grid-template-columns: 125px repeat(3, 1fr); 
            grid-template-rows: 85px repeat(3, 1fr);
            gap: 12px; background: var(--card); padding: 15px; 
            border: 1px solid var(--border); 
            width: 95vw; max-width: 480px;
            aspect-ratio: 1/1;
        }

        .cell { 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            font-weight: 900; text-transform: uppercase; 
            position: relative; word-wrap: break-word; line-height: 1.1;
            font-size: 0.65rem;
        }

        .cat-header { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #1a1a1a; padding: 6px; 
            border-bottom: 3px solid var(--accent); cursor: help;
        }

        .tooltip {
            visibility: hidden; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: #111; color: var(--accent); padding: 10px; border: 1px solid var(--accent);
            width: 150px; font-size: 0.6rem; font-weight: 700; z-index: 100; text-transform: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.9); pointer-events: none; opacity: 0; transition: 0.2s; line-height: 1.2;
        }
        .cat-header:hover .tooltip { visibility: visible; opacity: 1; }

        .square { background: #080808; border: 1px solid var(--border); cursor: pointer; position: relative; background-size: cover; background-position: center; transition: 0.15s; overflow: hidden; }
        .square:hover { border-color: var(--accent); z-index: 5; }

        /* SCROLLS & LABELS */
        .rarity-tag { 
            position: absolute; top: 4px; right: 4px; font-size: 0.42rem; font-weight: 900; 
            padding: 2px 6px; border-radius: 2px; text-transform: uppercase; z-index: 10;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            background-image: linear-gradient(90deg, #222 0%, #444 5%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 85%, #444 95%, #222 100%);
            color: #000; border: 1px solid #000;
        }
        .char-label { 
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 40%); 
            color: #fff; font-size: 0.52rem; padding: 6px 0 4px; font-weight: 900; 
            text-align: center; border-top: 1px solid rgba(255,255,255,0.1); 
        }

        /* STABILIZED MODALS */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); z-index: 2000; 
            justify-content: center; align-items: flex-start; padding-top: 10vh; 
        }
        .modal-box { 
            width: 90%; max-width: 360px; background: #111; 
            padding: 20px; border: 1px solid var(--border); 
            text-align: center; border-radius: 10px; position: relative;
        }
        
        .target-brief { background: #fefefe; color: var(--t7p-black); padding: 15px; margin-bottom: 15px; border-radius: 8px; border-top: 5px solid var(--accent); }
        .target-text { font-size: 1.2rem; font-weight: 900; line-height: 1.1; text-transform: uppercase; font-family: 'Poppins', sans-serif;}
        .target-subtext { font-size: 0.65rem; font-weight: 700; color: #555; margin-top: 8px; text-transform: none; border-top: 1px solid #ddd; padding-top: 8px; width: 100%; text-align: left; }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; font-weight: 700; outline: none; margin-bottom: 10px; box-sizing: border-box; border-radius: 4px; }
        
        /* HINT BUTTON REPAIR */
        .hint-btn { 
            width: 100%; padding: 8px; background: transparent; border: 1px solid var(--sharingan); 
            color: var(--sharingan); font-weight: 900; cursor: pointer; 
            font-size: 0.65rem; text-transform: uppercase; border-radius: 4px; margin-bottom: 10px;
        }
        .hint-btn:hover { background: rgba(255, 0, 0, 0.1); }

        #sharingan-insight { margin-bottom: 10px; }
        .choice-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #fff; 
            width: 100%; padding: 10px; font-size: 0.75rem; font-weight: 700; 
            cursor: pointer; text-align: left; margin-bottom: 5px; border-radius: 4px; 
        }
        
        #results { margin-top: 10px; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); text-align: left; }
        .res-row { 
            padding: 10px; border-bottom: 1px solid #222; cursor: pointer; 
            color: #aaa; font-size: 0.75rem; display: flex; justify-content: space-between; 
        }
        .res-row.blacklisted { text-decoration: line-through; color: var(--wrong); opacity: 0.4; pointer-events: none; }
        
        .btn-main { width: 100%; margin-top: 10px; padding: 12px; background: var(--accent); color: #000; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        .btn-secondary { width: 100%; margin-top: 10px; padding: 10px; background: #222; color: #fff; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; border-radius: 4px; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .cal-date { padding: 8px 0; font-size: 0.75rem; font-weight: 700; cursor: pointer; background: #080808; color: #fff; border: 1px solid transparent; }
        .cal-date.active-date { background: var(--accent); color: #000; }
        .cal-date.disabled { opacity: 0.1; cursor: default; }
    </style>
</head>
<body>

<header>
    <h1>AnimeGrids</h1>
    <p id="season-display" style="color:var(--accent); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; margin-top: 5px;"></p>
    <button class="archive-trigger" onclick="openCalendar()">[ Archive Chronology ]</button>
</header>

<div class="grid" id="main-grid">
    <div class="cell"></div>
    <div class="cell cat-header" id="c0">...</div>
    <div class="cell cat-header" id="c1">...</div>
    <div class="cell cat-header" id="c2">...</div>
    <div class="cell cat-header" id="r0">...</div>
    <div class="cell square" id="sq-0-0" onclick="openSearch(0, 0)"></div>
    <div class="cell square" id="sq-0-1" onclick="openSearch(0, 1)"></div>
    <div class="cell square" id="sq-0-2" onclick="openSearch(0, 2)"></div>
    <div class="cell cat-header" id="r1">...</div>
    <div class="cell square" id="sq-1-0" onclick="openSearch(1, 0)"></div>
    <div class="cell square" id="sq-1-1" onclick="openSearch(1, 1)"></div>
    <div class="cell square" id="sq-1-2" onclick="openSearch(1, 2)"></div>
    <div class="cell cat-header" id="r2">...</div>
    <div class="cell square" id="sq-2-0" onclick="openSearch(2, 0)"></div>
    <div class="cell square" id="sq-2-1" onclick="openSearch(2, 1)"></div>
    <div class="cell square" id="sq-2-2" onclick="openSearch(2, 2)"></div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <div class="target-brief" id="target-brief">
            <div class="target-text" id="target-title">CAT A + CAT B</div>
            <div class="target-subtext" id="target-desc">Briefing active. Identify the correct operative.</div>
        </div>
        <input type="text" id="query" placeholder="SEARCH OPERATIVE..." oninput="search()">
        <button id="sharingan-trigger" class="hint-btn" onclick="useSharingan()">[Use Sharingan]</button>
        <div id="sharingan-insight" style="display:none;"></div>
        <div id="results"></div>
        <button class="btn-secondary" onclick="closeSearch()">Close HUD</button>
    </div>
</div>

<div id="calendar-modal" class="modal">
    <div class="modal-box">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer; font-weight:900;"> < </button>
            <h3 id="cal-month-year" style="margin:0; font-size:0.9rem; font-style:italic; text-transform: uppercase;"></h3>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer; font-weight:900;"> > </button>
        </div>
        <div class="cal-grid" id="cal-grid-days"></div>
        <button class="btn-secondary" style="width:100%; margin-top:20px;" onclick="closeCalendar()">Abort mission</button>
    </div>
</div>

<div id="report-modal" class="modal">
    <div class="modal-box">
        <h2 style="font-style:italic; margin:0;">MISSION REPORT</h2>
        <p id="final-score" style="font-size:2.5rem; font-weight:900; color:var(--accent); margin:15px 0;"></p>
        <button class="btn-main" onclick="copyResults()">Copy Intel 📋</button>
        <button class="btn-secondary" onclick="document.getElementById('report-modal').style.display='none'">Return</button>
    </div>
</div>

<script>
    const FEED_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQu_D0TAHB0hVBlCU-JDFmswPoB8qOLGKEzsfAbKfLoaut3rrdYoJ1_BmKAgX-Y0cTXvG6XvSjco1Fu/pub?gid=626671231&single=true&output=csv';
    const SEASON_COLORS = ["#00E5FF", "#7024AA", "#196F1E", "#EBA7B7", "#FFD700", "#FF3B3B"];

    let db = [], rowCats = [], colCats = [], activeSq = null;
    let missionHistory = Array(9).fill('empty'), correctCount = 0, blacklistedNames = {}; 
    let intelBriefs = {};
    let currentGridDate = new Date().toDateString();
    let displayMonth = new Date().getMonth(), displayYear = new Date().getFullYear();

    async function init() {
        try {
            const res = await fetch(FEED_URL);
            const text = await res.text();
            processData(text);
            loadMission(currentGridDate);
        } catch (e) { console.error("Intel Feed Failure", e); }
    }

    function processData(csv) {
        const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        const raw = lines.slice(1).map(l => {
            const v = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let o = {};
            headers.forEach((h, i) => {
                let key = h;
                if (h.includes("name") || h.includes("character")) key = "name";
                else if (h.includes("series")) key = "series";
                else if (h.includes("tags")) key = "tags";
                else if (h.includes("image")) key = "image";
                else if (h.includes("definition") || h.includes("brief")) key = "def";
                o[key] = (v[i] || "").replace(/^"|"$/g, '').trim();
            });
            return o;
        });
        raw.forEach(item => {
            if (item.def && item.def.includes("-")) {
                const parts = item.def.split("-");
                intelBriefs[parts[0].trim().toLowerCase()] = parts.slice(1).join("-").trim();
            } else if (item.def && item.name) {
                intelBriefs[item.name.toLowerCase()] = item.def;
            }
        });
        db = raw.filter(char => char.name && char.series && (!char.def || !char.def.includes("-")));
    }

    function getRarity(char) {
        const tags = (char.tags || "").split(',').length;
        if (tags > 12) return { label: 'Genin', color: '#BDBDBD' };
        if (tags > 10) return { label: 'Chunin', color: '#A5D6A7' };
        if (tags > 8)  return { label: 'Jonin', color: '#B2EBF2' };
        if (tags > 6)  return { label: 'Anbu', color: '#EEEEEE' };
        if (tags > 4)  return { label: 'Kage', color: '#FFF59D' };
        if (tags > 2)  return { label: 'Legendary Sannin', color: '#E1BEE7' };
        return { label: 'Ghost of Valor', color: '#FFCDD2' };
    }

    function calculateSeason(date) {
        const d = new Date(date);
        const seasonNum = ((d.getFullYear() - 2026) * 4) + Math.floor(d.getMonth() / 3) + 1;
        return { num: seasonNum, color: SEASON_COLORS[(seasonNum - 1) % SEASON_COLORS.length] };
    }

    function loadMission(dateStr) {
        currentGridDate = dateStr;
        missionHistory = Array(9).fill('empty'); correctCount = 0; blacklistedNames = {};
        const sInfo = calculateSeason(dateStr);
        document.documentElement.style.setProperty('--accent', sInfo.color);
        document.getElementById('season-display').innerText = `SEASON ${sInfo.num} TACTICAL`;
        for (let i = 0; i < 9; i++) {
            let s = document.getElementById(`sq-${Math.floor(i/3)}-${i%3}`);
            s.style.backgroundImage = 'none'; s.style.backgroundColor = "#080808"; s.innerHTML = "";
        }
        setupGrid(dateStr);
        renderHeaders();
    }

    function setupGrid(seed) {
        const allSeries = [...new Set(db.map(c => c.series).filter(s => s))];
        const allTags = [...new Set(db.flatMap(c => (c.tags || "").split(',').map(t => t.trim())).filter(t => t))];
        const master = [...allSeries, ...allTags];
        let h = seed.split('').reduce((a, b) => ((a << 5) - a) + b.charCodeAt(0), 0);
        const rng = () => { h = (h * 9301 + 49297) % 233280; return h / 233280; };
        const shuffle = (a) => a.sort(() => rng() - 0.5);
        let tries = 0;
        while (tries < 1500) {
            let p = shuffle([...master]);
            let r = p.slice(0, 3), c = p.slice(3, 6);
            let ok = true;
            for (let row of r) {
                for (let col of c) {
                    if (db.filter(char => matches(char, row) && matches(char, col)).length < 1) { ok = false; break; }
                }
                if (!ok) break;
            }
            if (ok) { rowCats = r; colCats = c; return; }
            tries++;
        }
    }

    const matches = (char, goal) => {
        const g = (goal || "").toLowerCase();
        return (char.series || "").toLowerCase() === g || (char.tags || "").toLowerCase().split(',').map(t=>t.trim()).includes(g);
    };

    function renderHeaders() {
        for(let i=0; i<3; i++) {
            const rTxt = rowCats[i] || "N/A", cTxt = colCats[i] || "N/A";
            const hideR = rTxt.toLowerCase().includes("hair"), hideC = cTxt.toLowerCase().includes("hair");
            const rDef = hideR ? "" : (intelBriefs[rTxt.toLowerCase()] || "Standard Mission Criteria.");
            const cDef = hideC ? "" : (intelBriefs[cTxt.toLowerCase()] || "Standard Mission Criteria.");
            const rTooltip = rDef ? `<span class="tooltip">${rDef}</span>` : "";
            const cTooltip = cDef ? `<span class="tooltip">${cDef}</span>` : "";
            document.getElementById(`r${i}`).innerHTML = `${rTxt} ${rTooltip}`;
            document.getElementById(`c${i}`).innerHTML = `${cTxt} ${cTooltip}`;
        }
    }

    function openCalendar() { document.getElementById('calendar-modal').style.display = 'flex'; drawCal(); }
    function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
    function changeMonth(dir) { displayMonth += dir; if(displayMonth<0){displayMonth=11;displayYear--;} if(displayMonth>11){displayMonth=0;displayYear++;} drawCal(); }

    function drawCal() {
        const grid = document.getElementById('cal-grid-days');
        grid.innerHTML = "";
        const first = new Date(displayYear, displayMonth, 1).getDay();
        const days = new Date(displayYear, displayMonth + 1, 0).getDate();
        document.getElementById('cal-month-year').innerText = `${new Date(displayYear, displayMonth).toLocaleString('default', { month: 'long' })} ${displayYear}`;
        for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= days; d++) {
            const dObj = new Date(displayYear, displayMonth, d);
            const isFuture = dObj > new Date(), isTooOld = dObj < new Date(2026, 0, 1);
            const div = document.createElement('div');
            div.className = 'cal-date' + (isFuture || isTooOld ? ' disabled' : '') + (dObj.toDateString() === currentGridDate ? ' active-date' : '');
            div.innerText = d;
            if (!isFuture && !isTooOld) div.onclick = () => { loadMission(dObj.toDateString()); closeCalendar(); };
            grid.appendChild(div);
        }
    }

    function openSearch(r, c) { 
        activeSq = {r, c}; const sqId = `sq-${r}-${c}`; if (!blacklistedNames[sqId]) blacklistedNames[sqId] = [];
        const rName = rowCats[r], cName = colCats[c];
        document.getElementById('target-title').innerText = `${rName} + ${cName}`;
        const hideR = rName.toLowerCase().includes("hair"), hideC = cName.toLowerCase().includes("hair");
        const rDef = hideR ? "Visual Identification Required." : (intelBriefs[rName.toLowerCase()] || "Mission Alpha.");
        const cDef = hideC ? "Visual Identification Required." : (intelBriefs[cName.toLowerCase()] || "Mission Beta.");
        document.getElementById('target-desc').innerHTML = `<b>${rName}:</b> ${rDef}<br><b>${cName}:</b> ${cDef}`;
        document.getElementById('query').value = ""; 
        document.getElementById('sharingan-insight').style.display = "none";
        document.getElementById('sharingan-trigger').style.display = "block"; 
        search();
        document.getElementById('search-modal').style.display = 'flex'; 
        document.getElementById('query').focus();
    }

    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

    function useSharingan() {
        const rCat = rowCats[activeSq.r], cCat = colCats[activeSq.c];
        const valid = db.filter(char => matches(char, rCat) && matches(char, cCat));
        const invalid = db.filter(char => !matches(char, rCat) || !matches(char, cCat));
        if (valid.length > 0 && invalid.length > 1) {
            const c = valid[Math.floor(Math.random()*valid.length)];
            const w1 = invalid[Math.floor(Math.random()*invalid.length)];
            const w2 = invalid[Math.floor(Math.random()*(invalid.length/2))];
            let choices = [c, w1, w2].sort(() => Math.random() - 0.5);
            const div = document.getElementById('sharingan-insight');
            div.innerHTML = "<p style='font-size:0.6rem; color:#f00; font-weight:900;'>[ INSIGHT REVEALED ]</p>";
            choices.forEach(char => {
                const b = document.createElement('button'); b.className = 'choice-btn'; b.innerText = char.name;
                b.onclick = () => selectChar(char); div.appendChild(b);
            });
            document.getElementById('sharingan-trigger').style.display = "none"; div.style.display = "block";
        }
    }

    function search() {
        const q = document.getElementById('query').value.toLowerCase().trim();
        const res = document.getElementById('results'), sqId = `sq-${activeSq.r}-${activeSq.c}`;
        res.innerHTML = "";
        const filtered = q === "" ? db : db.filter(c => c.name.toLowerCase().includes(q));
        filtered.forEach(char => {
            const isBlacklisted = blacklistedNames[sqId].includes(char.name);
            const d = document.createElement('div'); d.className = 'res-row' + (isBlacklisted ? ' blacklisted' : '');
            d.innerHTML = `<span>${char.name}</span> <span style="font-size:0.5rem; opacity:0.5;">${char.series}</span>`;
            if (!isBlacklisted) d.onclick = () => selectChar(char); res.appendChild(d);
        });
    }

    function selectChar(char) {
        const idx = activeSq.r * 3 + activeSq.c, sqId = `sq-${activeSq.r}-${activeSq.c}`;
        if (matches(char, rowCats[activeSq.r]) && matches(char, colCats[activeSq.c])) {
            const s = document.getElementById(sqId);
            const rarity = getRarity(char);
            if (missionHistory[idx] === 'empty') { missionHistory[idx] = 'correct'; correctCount++; }
            s.style.backgroundImage = char.image ? `url('${char.image}')` : 'none';
            if(!char.image) s.style.backgroundColor = "#222";
            s.innerHTML = `<div class="rarity-tag" style="background-color:${rarity.color}">${rarity.label}</div><div class="char-label">${char.name}</div>`;
            closeSearch(); if (!missionHistory.includes('empty')) showReport();
        } else {
            if (!blacklistedNames[sqId].includes(char.name)) blacklistedNames[sqId].push(char.name);
            missionHistory[idx] = 'wrong'; search();
            if (!missionHistory.includes('empty')) showReport();
        }
    }

    function showReport() { document.getElementById('final-score').innerText = `${correctCount}/9`; document.getElementById('report-modal').style.display = 'flex'; }
    function copyResults() {
        let grid = ""; missionHistory.forEach((s, i) => { grid += (s === 'correct' ? '💥' : '❌'); if ((i + 1) % 3 === 0) grid += "\n"; });
        const s = calculateSeason(currentGridDate);
        navigator.clipboard.writeText(`🏴‍☠️ AnimeGrids (T7P)\nSeason ${s.num}\nScore: ${correctCount}/9\n\n${grid}\nteam7pirates.com`).then(() => alert("COPIED"));
    }

    init();
</script>
</body>
</html>
